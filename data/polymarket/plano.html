<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket — Plano de Projeto</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;max-width:900px;margin:0 auto;padding:20px;line-height:1.7;}
h1,h2,h3{color:#58a6ff;margin-top:1.5em;}
h1{border-bottom:1px solid #30363d;padding-bottom:10px;}
h2{border-bottom:1px solid #21262d;padding-bottom:6px;}
table{border-collapse:collapse;width:100%;margin:15px 0;}
th,td{border:1px solid #30363d;padding:8px 12px;text-align:left;font-size:13px;}
th{background:#161b22;color:#79c0ff;}
code{background:#161b22;padding:2px 6px;border-radius:3px;font-size:13px;}
pre{background:#161b22;padding:15px;border-radius:8px;overflow-x:auto;border:1px solid #30363d;}
pre code{padding:0;background:none;}
blockquote{border-left:3px solid #58a6ff;padding-left:15px;color:#8b949e;margin:15px 0;}
a{color:#58a6ff;}
li{margin:4px 0;}
</style>
</head><body>
<div id="content">Carregando...</div>
<script>
fetch('POLYMARKET-PROJETO-COMPLETO.md').then(r=>r.text()).then(md=>{
  document.getElementById('content').innerHTML=marked.parse(md);
});
</script>
</body></html>
