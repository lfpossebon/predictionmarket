<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Trader Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
h1 { color: #58a6ff; margin-bottom: 5px; }
.subtitle { color: #8b949e; margin-bottom: 20px; }
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.filters select, .filters input { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.filters label { color: #8b949e; font-size: 13px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; text-align: center; }
.stat-card .value { font-size: 24px; font-weight: bold; color: #58a6ff; }
.stat-card .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #161b22; color: #58a6ff; padding: 10px 8px; text-align: left; cursor: pointer; position: sticky; top: 0; border-bottom: 2px solid #30363d; }
th:hover { background: #1f2937; }
th.sorted-asc::after { content: ' ▲'; }
th.sorted-desc::after { content: ' ▼'; }
td { padding: 8px; border-bottom: 1px solid #21262d; }
tr:hover { background: #161b22; }
.positive { color: #3fb950; }
.negative { color: #f85149; }
.tag { display: inline-block; background: #1f2937; color: #79c0ff; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin: 1px; }
.tag.politics { background: #1a1a2e; color: #e94560; }
.tag.crypto { background: #1a2e1a; color: #50fa7b; }
.tag.sports { background: #2e2a1a; color: #f1fa8c; }
.tag.economics { background: #1a2e2e; color: #8be9fd; }
.tag.finance { background: #2e1a2e; color: #ff79c6; }
.tag.active { background: #0d4429; color: #3fb950; }
.tag.inactive { background: #3d1a1a; color: #f85149; }
.bar { height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; min-width: 60px; }
.bar-fill { height: 100%; border-radius: 3px; }
.expand-btn { cursor: pointer; color: #58a6ff; text-decoration: underline; font-size: 12px; }
.detail-row { display: none; }
.detail-row.show { display: table-row; }
.detail-content { padding: 15px; background: #0d1117; }
.detail-content h3 { color: #58a6ff; margin-bottom: 10px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.market-list { font-size: 12px; color: #8b949e; }
.market-list li { margin: 3px 0; }
#chart-container { margin-bottom: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; }
</style>
</head>
<body>

<h1>📊 Polymarket Trader Explorer</h1>
<p class="subtitle">Análise exploratória de 80 traders • Dados: 21/02/2026</p>

<div class="stats" id="stats"></div>

<div class="filters">
  <div>
    <label>Categoria:</label>
    <select id="filterCat">
      <option value="">Todas</option>
      <option value="POLITICS">Politics</option>
      <option value="CRYPTO">Crypto</option>
      <option value="SPORTS">Sports</option>
      <option value="ECONOMICS">Economics</option>
      <option value="FINANCE">Finance</option>
      <option value="TECH">Tech</option>
      <option value="CULTURE">Culture</option>
    </select>
  </div>
  <div>
    <label>Status:</label>
    <select id="filterActive">
      <option value="">Todos</option>
      <option value="true">Ativo</option>
      <option value="false">Inativo</option>
    </select>
  </div>
  <div>
    <label>Min PnL ($):</label>
    <input type="number" id="filterMinPnl" value="0" style="width:120px">
  </div>
  <div>
    <label>Min Eficiência (%):</label>
    <input type="number" id="filterMinEff" value="0" style="width:100px">
  </div>
  <div>
    <label>Min Posições:</label>
    <input type="number" id="filterMinPos" value="0" style="width:80px">
  </div>
  <div>
    <label>Períodos:</label>
    <select id="filterPeriods">
      <option value="0">Qualquer</option>
      <option value="2">2+</option>
      <option value="3">3 (mais consistente)</option>
    </select>
  </div>
</div>

<div id="chart-container">
  <canvas id="scatterChart" height="300"></canvas>
</div>

<table>
<thead>
<tr>
  <th data-col="rank">#</th>
  <th data-col="name">Trader</th>
  <th data-col="pnl_all">PnL</th>
  <th data-col="vol_all">Volume</th>
  <th data-col="efficiency">Eficiência</th>
  <th data-col="n_positions">Posições</th>
  <th data-col="unique_markets">Mercados</th>
  <th data-col="avg_position_size">Avg Size</th>
  <th data-col="n_categories">Categorias</th>
  <th data-col="n_periods">Períodos</th>
  <th data-col="is_active">Status</th>
  <th>Detalhes</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let DATA = [];
let sortCol = 'pnl_all';
let sortDir = 'desc';

fetch('eda_full.json').then(r => r.json()).then(data => {
  DATA = data;
  render();
  renderStats();
  renderChart();
});

function fmt(n) {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function pct(n) { return (n * 100).toFixed(1) + '%'; }

function getFiltered() {
  const cat = document.getElementById('filterCat').value;
  const active = document.getElementById('filterActive').value;
  const minPnl = parseFloat(document.getElementById('filterMinPnl').value) || 0;
  const minEff = parseFloat(document.getElementById('filterMinEff').value) / 100 || 0;
  const minPos = parseInt(document.getElementById('filterMinPos').value) || 0;
  const minPeriods = parseInt(document.getElementById('filterPeriods').value) || 0;
  
  return DATA.filter(t => {
    if (cat && !t.categories.includes(cat)) return false;
    if (active === 'true' && !t.is_active) return false;
    if (active === 'false' && t.is_active) return false;
    if (t.pnl_all < minPnl) return false;
    if (t.efficiency < minEff) return false;
    if (t.n_positions < minPos) return false;
    if (t.n_periods < minPeriods) return false;
    return true;
  });
}

function renderStats() {
  const filtered = getFiltered();
  const active = filtered.filter(t => t.is_active).length;
  const avgEff = filtered.reduce((s, t) => s + t.efficiency, 0) / Math.max(filtered.length, 1);
  const totalPnl = filtered.reduce((s, t) => s + t.pnl_all, 0);
  const multiPeriod = filtered.filter(t => t.n_periods >= 2).length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="value">${filtered.length}</div><div class="label">Traders</div></div>
    <div class="stat-card"><div class="value">${active}</div><div class="label">Ativos</div></div>
    <div class="stat-card"><div class="value">${fmt(totalPnl)}</div><div class="label">PnL Total</div></div>
    <div class="stat-card"><div class="value">${pct(avgEff)}</div><div class="label">Eficiência Média</div></div>
    <div class="stat-card"><div class="value">${multiPeriod}</div><div class="label">Multi-período</div></div>
  `;
}

function render() {
  const filtered = getFiltered();
  const maxPnl = Math.max(...filtered.map(t => t.pnl_all));
  const maxEff = Math.max(...filtered.map(t => t.efficiency));
  
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map((t, i) => {
    const catTags = t.categories.filter(c => c !== 'OVERALL').map(c => 
      `<span class="tag ${c.toLowerCase()}">${c}</span>`
    ).join('');
    const statusTag = t.is_active 
      ? '<span class="tag active">ATIVO</span>' 
      : '<span class="tag inactive">INATIVO</span>';
    const pnlBar = (t.pnl_all / maxPnl * 100).toFixed(0);
    const effBar = (t.efficiency / Math.max(maxEff, 0.001) * 100).toFixed(0);
    const markets = (t.market_titles_sample || []).filter(Boolean).map(m => `<li>${m.substring(0, 60)}</li>`).join('');
    
    return `
    <tr>
      <td>${i + 1}</td>
      <td><strong>${t.name || t.wallet.substring(0, 12) + '...'}</strong></td>
      <td class="positive">${fmt(t.pnl_all)}<div class="bar"><div class="bar-fill" style="width:${pnlBar}%;background:#3fb950"></div></div></td>
      <td>${fmt(t.vol_all)}</td>
      <td><span class="${t.efficiency > 0.1 ? 'positive' : ''}">${pct(t.efficiency)}</span><div class="bar"><div class="bar-fill" style="width:${effBar}%;background:#58a6ff"></div></div></td>
      <td>${t.n_positions}</td>
      <td>${t.unique_markets}</td>
      <td>${t.avg_position_size > 0 ? fmt(t.avg_position_size) : '-'}</td>
      <td>${catTags || '-'}</td>
      <td><strong>${t.n_periods}</strong>/3</td>
      <td>${statusTag}</td>
      <td><span class="expand-btn" onclick="toggleDetail(this, ${i})">📋</span></td>
    </tr>
    <tr class="detail-row" id="detail-${i}">
      <td colspan="12">
        <div class="detail-content">
          <div class="detail-grid">
            <div>
              <h3>📈 Rankings</h3>
              ${Object.entries(t.rankings || {}).map(([k, v]) => 
                `<div><span class="tag">${k}</span> #${v.rank} — PnL ${fmt(v.pnl)}</div>`
              ).join('')}
            </div>
            <div>
              <h3>🎯 Mercados Ativos</h3>
              <ul class="market-list">${markets || '<li>Sem posições ativas</li>'}</ul>
            </div>
          </div>
          <div style="margin-top:10px;font-size:12px;color:#8b949e">
            Wallet: <code>${t.wallet}</code> | 
            Buys recentes: ${t.n_recent_buys} | 
            Sells recentes: ${t.n_recent_sells} |
            Buy/Sell ratio: ${t.buy_sell_ratio.toFixed(1)}
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
  
  renderStats();
}

function toggleDetail(el, idx) {
  const row = document.getElementById('detail-' + idx);
  row.classList.toggle('show');
}

// Sort
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = 'desc'; }
    document.querySelectorAll('th').forEach(t => t.className = '');
    th.className = 'sorted-' + sortDir;
    render();
  });
});

// Filters
['filterCat', 'filterActive', 'filterMinPnl', 'filterMinEff', 'filterMinPos', 'filterPeriods'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => { render(); renderChart(); });
  document.getElementById(id).addEventListener('input', () => { render(); renderChart(); });
});

// Simple scatter chart (PnL vs Efficiency)
function renderChart() {
  const canvas = document.getElementById('scatterChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 30;
  canvas.width = W;
  canvas.height = 300;
  ctx.clearRect(0, 0, W, 300);
  
  const filtered = getFiltered();
  if (!filtered.length) return;
  
  const maxPnl = Math.max(...filtered.map(t => t.pnl_all));
  const maxEff = Math.max(...filtered.map(t => t.efficiency));
  const pad = { l: 60, r: 20, t: 30, b: 40 };
  const pw = W - pad.l - pad.r;
  const ph = 300 - pad.t - pad.b;
  
  // Axes
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t);
  ctx.lineTo(pad.l, 300 - pad.b);
  ctx.lineTo(W - pad.r, 300 - pad.b);
  ctx.stroke();
  
  // Labels
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px sans-serif';
  ctx.fillText('Eficiência (PnL/Volume) →', W/2 - 60, 300 - 5);
  ctx.save();
  ctx.translate(15, 300/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('PnL →', -20, 0);
  ctx.restore();
  
  // Title
  ctx.fillStyle = '#58a6ff';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText('PnL vs Eficiência (tamanho = posições ativas)', pad.l, 18);
  
  // Points
  filtered.forEach(t => {
    const x = pad.l + (t.efficiency / Math.max(maxEff, 0.001)) * pw;
    const y = 300 - pad.b - (t.pnl_all / maxPnl) * ph;
    const r = Math.max(3, Math.min(15, Math.sqrt(t.n_positions) * 2));
    
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = t.is_active ? 'rgba(63, 185, 80, 0.6)' : 'rgba(248, 81, 73, 0.4)';
    ctx.fill();
    ctx.strokeStyle = t.is_active ? '#3fb950' : '#f85149';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // Label for top traders
    if (t.pnl_all > maxPnl * 0.3 || t.efficiency > maxEff * 0.5) {
      ctx.fillStyle = '#c9d1d9';
      ctx.font = '10px sans-serif';
      ctx.fillText(t.name || t.wallet.substring(0, 8), x + r + 3, y - 3);
    }
  });
}
</script>
</body>
</html>
